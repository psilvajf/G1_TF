# =====================================================================
# Configuracao de TESTE - usa banco H2 em memoria (modo PostgreSQL).
# Permite testar a camada de persistencia sem um Postgres instalado.
# =====================================================================

spring.datasource.url=jdbc:h2:mem:pokemon_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Em teste, o Hibernate cria o schema a partir das entidades.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.sql.init.mode=never
