# =====================================================================
# Pokemon Game API - Configuracao da aplicacao (Spring Boot)
# Parte do integrante: Everton - Banco de Dados e Persistencia
# =====================================================================

spring.application.name=pokemon-game-api
server.port=8080

# ----------------------- Conexao PostgreSQL --------------------------
# Os valores podem ser sobrescritos por variaveis de ambiente
# (ex.: DB_URL, DB_USERNAME, DB_PASSWORD) ao subir a aplicacao.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/pokemon_game}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ----------------------- JPA / Hibernate -----------------------------
# O schema oficial e criado pelo script db/schema.sql (ver INSTALL.md).
# Por isso o Hibernate apenas VALIDA o mapeamento contra o banco,
# em vez de gerar/alterar tabelas automaticamente.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ----------------------- Inicializacao por script --------------------
# Desligada por padrao: rode schema.sql e data.sql manualmente (INSTALL.md).
# Para um "quick start" que cria e popula o banco ao subir a app,
# troque ddl-auto para "none" e ative as 3 linhas abaixo:
#   spring.sql.init.mode=always
#   spring.sql.init.schema-locations=classpath:db/schema.sql
#   spring.sql.init.data-locations=classpath:db/data.sql
spring.sql.init.mode=never
